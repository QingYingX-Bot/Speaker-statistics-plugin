<!DOCTYPE html>
<html>
	<head>
		<style>
{{INLINE_STYLE}}
</style>
	</head>
	<body>
		<div class="container">
			<div class="header" style="{{BACKGROUND_STYLE}}">
				<div class="title">{{TITLE}}</div>
				<div class="user-profile">
					<img class="avatar" src="{{AVATAR_URL}}" onerror="this.style.display='none'" />
					<div class="user-info">
						<div class="nickname">{{DISPLAY_NAME}}</div>
						<div class="info-container">
							<div class="info-item">
								<div class="info-icon clock-icon"></div>
								<span class="info-label">最后发言时间：</span>
								<span class="info-value">{{LAST_SPEAKING_TIME}}</span>
							</div>
							<div class="info-item">
								<div class="info-icon globe-icon"></div>
								<span class="info-value">{{GLOBAL_INFO}}</span>
							</div>
						</div>
					</div>
				</div>
			</div>
			<div class="stats-section">
				<div class="stats-grid">
					{{STATS_GRID}}
				</div>
			</div>
			<div class="footer">
				生成时间：{{GENERATE_TIME}} | Speaker-statistics-plugin v{{VERSION}}
			</div>
		</div>
	</body>
</html>
